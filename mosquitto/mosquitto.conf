# =============================================================
# Mosquitto MQTT Broker Configuration
# =============================================================

# Basic settings
listener 1883 0.0.0.0
allow_anonymous true

# WebSocket listener (optional - for browser-based debugging)
listener 9001 0.0.0.0
protocol websockets

# Persistence
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection settings
max_keepalive 300

connection bridge-to-controller
address 172.20.0.1:1884

bridge_protocol_version mqttv311
cleansession true
remote_clientid bridge-from-vm-lojain

topic sensors/# both 0
bridge_attempt_unsubscribe false
start_type automatic
