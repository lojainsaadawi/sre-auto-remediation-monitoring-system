# =============================================================
# Prometheus Configuration
# =============================================================

global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'edge-monitoring'

# Load alert rules
rule_files:
  - "/etc/prometheus/alerts.yml"

# Alertmanager connection
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# =============================================================
# Scrape Configurations
# =============================================================

scrape_configs:

  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # OpenStack infrastructure nodes (controller, compute1, compute2)
  - job_name: 'openstack_nodes'
    static_configs:
      - targets:
          - '192.168.122.55:9100'    # controller
          - '192.168.122.199:9100'   # compute1
          - '192.168.122.18:9100'    # compute2
        labels:
          role: 'openstack-node'

  # Edge nodes — dynamically discovered via update-targets.sh
  # targets.json is updated every 5 minutes by the cron job
  - job_name: 'edge_nodes'
    file_sd_configs:
      - files:
          - '/etc/prometheus/targets.json'
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
      - source_labels: [zone]
        target_label: zone
      - source_labels: [vm_id]
        target_label: vm_id
