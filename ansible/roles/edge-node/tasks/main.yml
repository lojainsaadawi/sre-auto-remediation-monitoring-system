---
# =============================================================
# Edge Node Role Tasks
# Deploys edge-node.py and runs it as a systemd service
# =============================================================

- name: "1. Configure apt proxy for internet access via Controller"
  copy:
    dest: /etc/apt/apt.conf.d/95proxy
    content: |
      Acquire::http::Proxy "{{ pip_proxy }}";
      Acquire::https::Proxy "{{ pip_proxy }}";
    mode: '0644'
  become: yes

- name: "2. Update apt cache"
  apt:
    update_cache: yes
    cache_valid_time: 3600
  become: yes

- name: "3. Install Python3 and pip"
  apt:
    name:
      - python3
      - python3-pip
      - python3-setuptools
    state: present
  become: yes

- name: "4. Install paho-mqtt via pip"
  pip:
    name: "{{ pip_packages }}"
    executable: pip3
    extra_args: "--proxy {{ pip_proxy }}"
  become: yes

- name: "5. Create Node Exporter textfile directory"
  file:
    path: "{{ metrics_dir }}"
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: '0755'
  become: yes
- name: "DEBUG: Check zone variable value"
  debug:
    var: zone
- name: "6. Deploy edge-node.py script"
  template:
    src: edge-node.py.j2
    dest: "{{ edge_node_script }}"
    owner: ubuntu
    group: ubuntu
    mode: '0755'
  become: yes
  notify: restart edge-node

- name: "7. Deploy systemd service"
  template:
    src: edge-node.service.j2
    dest: "{{ edge_node_service }}"
    owner: root
    group: root
    mode: '0644'
  become: yes
  notify: restart edge-node

- name: "8. Reload systemd daemon"
  systemd:
    daemon_reload: yes
  become: yes

- name: "9. Enable and start edge-node service"
  systemd:
    name: edge-node
    state: started
    enabled: yes
  become: yes

- name: "10. Verify edge-node service is running"
  systemd:
    name: edge-node
  register: edge_node_status
  become: yes

- name: "11. Display service status"
  debug:
    msg: >
      Edge node service on {{ inventory_hostname }} ({{ zone }}):
      Status = {{ edge_node_status.status.ActiveState }}

- name: "12. Wait for metrics file to be created"
  wait_for:
    path: "{{ metrics_dir }}/edge_metrics.prom"
    timeout: 30
  become: yes

- name: "13. Confirm metrics file exists"
  debug:
    msg: "Metrics file confirmed at {{ metrics_dir }}/edge_metrics.prom on {{ inventory_hostname }}"
